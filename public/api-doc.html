<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WNACG Downloader API 文档</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffaf5;
        --panel: rgba(255, 255, 255, 0.92);
        --text: #172033;
        --muted: #5b6475;
        --line: #f3d7bd;
        --accent: #ea580c;
        --code-bg: #fff1e7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top, #fff2e2 0%, #fffaf5 32%, #f8fafc 100%);
        color: var(--text);
      }

      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      .hero {
        margin-bottom: 20px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .title {
        margin: 0;
        font-size: 38px;
        line-height: 1.1;
      }

      .desc {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .doc {
        padding: 28px;
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 16px 50px rgba(15, 23, 42, 0.06);
      }

      .doc h1,
      .doc h2,
      .doc h3 {
        line-height: 1.2;
      }

      .doc h1 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 32px;
      }

      .doc h2 {
        margin-top: 32px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 24px;
      }

      .doc h3 {
        margin-top: 24px;
        margin-bottom: 10px;
        font-size: 18px;
      }

      .doc p,
      .doc li {
        font-size: 15px;
        line-height: 1.8;
      }

      .doc a {
        color: #0f62fe;
        text-decoration: none;
      }

      .doc a:hover {
        text-decoration: underline;
      }

      .doc code {
        padding: 0.15em 0.4em;
        border-radius: 6px;
        background: var(--code-bg);
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.92em;
      }

      .doc pre {
        overflow: auto;
        padding: 16px;
        border-radius: 16px;
        background: #111827;
        color: #f8fafc;
      }

      .doc pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .doc table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
        font-size: 14px;
      }

      .doc th,
      .doc td {
        padding: 12px 14px;
        border: 1px solid #e5e7eb;
        text-align: left;
        vertical-align: top;
      }

      .doc th {
        background: #fff7ed;
      }

      .footer {
        margin-top: 16px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 720px) {
        .page {
          padding: 20px 14px 40px;
        }

        .hero,
        .doc {
          padding: 18px;
          border-radius: 18px;
        }

        .title {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <div class="eyebrow">WNACG HTTP Downloader</div>
        <h1 class="title">API 文档</h1>
        <p class="desc">下载接口、任务查询和输入规则都在这里，适合直接对接 GET 请求。</p>
      </section>
      <article class="doc" id="doc">文档加载中...</article>
      <div class="footer">文档内容来自 <code>/api-doc.md</code></div>
    </div>

    <script>
      function escapeHtml(text) {
        return text
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
      }

      function renderInline(text) {
        return escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>')
      }

      function renderTable(rows) {
        if (rows.length < 2) {
          return ''
        }

        const headerCells = rows[0]
          .split('|')
          .map((cell) => cell.trim())
          .filter(Boolean)
          .map((cell) => `<th>${renderInline(cell)}</th>`)
          .join('')

        const bodyRows = rows
          .slice(2)
          .map((row) => {
            const cells = row
              .split('|')
              .map((cell) => cell.trim())
              .filter(Boolean)
              .map((cell) => `<td>${renderInline(cell)}</td>`)
              .join('')
            return cells ? `<tr>${cells}</tr>` : ''
          })
          .filter(Boolean)
          .join('')

        return `<table><thead><tr>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table>`
      }

      function renderMarkdown(markdown) {
        const lines = markdown.replace(/\r\n/g, '\n').split('\n')
        const parts = []
        let i = 0

        while (i < lines.length) {
          const line = lines[i]
          const trimmed = line.trim()

          if (!trimmed) {
            i += 1
            continue
          }

          if (trimmed.startsWith('```')) {
            const codeLines = []
            i += 1
            while (i < lines.length && !lines[i].trim().startsWith('```')) {
              codeLines.push(lines[i])
              i += 1
            }
            parts.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`)
            i += 1
            continue
          }

          if (/^###\s+/.test(trimmed)) {
            parts.push(`<h3>${renderInline(trimmed.replace(/^###\s+/, ''))}</h3>`)
            i += 1
            continue
          }

          if (/^##\s+/.test(trimmed)) {
            parts.push(`<h2>${renderInline(trimmed.replace(/^##\s+/, ''))}</h2>`)
            i += 1
            continue
          }

          if (/^#\s+/.test(trimmed)) {
            parts.push(`<h1>${renderInline(trimmed.replace(/^#\s+/, ''))}</h1>`)
            i += 1
            continue
          }

          if (trimmed.includes('|') && i + 1 < lines.length && /^\s*\|(?:\s*---\s*\|)+\s*$/.test(lines[i + 1])) {
            const tableLines = [trimmed, lines[i + 1].trim()]
            i += 2
            while (i < lines.length && lines[i].trim().includes('|')) {
              tableLines.push(lines[i].trim())
              i += 1
            }
            parts.push(renderTable(tableLines))
            continue
          }

          if (/^- /.test(trimmed)) {
            const items = []
            while (i < lines.length && /^- /.test(lines[i].trim())) {
              items.push(`<li>${renderInline(lines[i].trim().replace(/^- /, ''))}</li>`)
              i += 1
            }
            parts.push(`<ul>${items.join('')}</ul>`)
            continue
          }

          const paragraph = [trimmed]
          i += 1
          while (
            i < lines.length &&
            lines[i].trim() &&
            !/^#{1,3}\s+/.test(lines[i].trim()) &&
            !/^```/.test(lines[i].trim()) &&
            !/^- /.test(lines[i].trim())
          ) {
            paragraph.push(lines[i].trim())
            i += 1
          }
          parts.push(`<p>${renderInline(paragraph.join(' '))}</p>`)
        }

        return parts.join('\n')
      }

      async function loadDoc() {
        const container = document.getElementById('doc')
        try {
          const response = await fetch('/api-doc.md', { cache: 'no-cache' })
          if (!response.ok) {
            throw new Error('加载文档失败')
          }
          const markdown = await response.text()
          container.innerHTML = renderMarkdown(markdown)
        } catch (error) {
          container.innerHTML =
            '<p>文档加载失败，请稍后重试。</p><pre><code>' +
            String(error instanceof Error ? error.message : error) +
            '</code></pre>'
        }
      }

      loadDoc()
    </script>
  </body>
</html>
